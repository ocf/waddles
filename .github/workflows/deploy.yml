name: Build and Deploy Waddles

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 1: Build the main Waddles image
      - name: Build and push Waddles
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ocf/waddles:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 2: Build the Magic image from the subfolder
      - name: Build and push Magic
        uses: docker/build-push-action@v5
        with:
          context: ./magic  # This points to your magic folder
          push: true
          tags: ghcr.io/ocf/waddlesmagic:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Watchtower Update
        run: |
          curl -v --fail \
            -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN }}" \
            "http://corruption.ocf.berkeley.edu:6767/v1/update"
