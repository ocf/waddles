services:
  bot:
    image: ghcr.io/ocf/waddles:latest
    container_name: waddles_bot
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host
    volumes:
      - bot_cache:/app/cache
      - bot_data:/app/data
      - bot_storage:/app/storage
      - bot_docs:/app/docs

  vllm:
    image: vllm/vllm-openai:gemma4-cu130
    container_name: waddles_vllm
    restart: unless-stopped
    ipc: host
    network_mode: host
    shm_size: 16G
    environment:
      - CUDA_VISIBLE_DEVICES=0,2
      - NCCL_P2P_DISABLE=1
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
      --tensor-parallel-size 2
      --max-model-len 32768
      --gpu-memory-utilization 0.4
      --host 0.0.0.0
      --port 30000
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --disable-custom-all-reduce

  watchtower:
    image: containrrr/watchtower
    container_name: waddles_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .watchtower.env
    ports:
      - "6767:8080"
    command: waddles_bot

volumes:
  bot_cache:
  bot_data:
  bot_storage:
  bot_docs:
