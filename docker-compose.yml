services:
  bot:
    image: ghcr.io/ocf/waddles:latest
    container_name: waddles_bot
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host
    volumes:
      - bot_cache:/app/cache
      - bot_data:/app/data
      - bot_storage:/app/storage
      - bot_docs:/app/docs

  magic:
    image: ghcr.io/ocf/waddlesmagic:latest
    container_name: waddles_magic
    restart: unless-stopped
    env_file:
      - .magic.env
    network_mode: host

  watchtower:
    image: containrrr/watchtower
    container_name: waddles_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .watchtower.env
    ports:
      - "6767:8080"
    command: waddles_bot waddles_magic

volumes:
  bot_cache:
  bot_data:
  bot_storage:
  bot_docs:
